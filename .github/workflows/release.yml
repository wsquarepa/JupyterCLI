name: Release

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    name: ci
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run CI gate
        run: cargo xtask ci

  build:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG does not match required format vX.Y.Z"
            exit 1
          fi

      - name: Set channel
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "JHC_CHANNEL=stable" >> "$GITHUB_ENV"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            if [[ "$BRANCH" == "stable" || "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Branch name '$BRANCH' is reserved for the stable release channel"
              exit 1
            fi
            if [[ "$BRANCH" == "master" ]]; then
              echo "JHC_CHANNEL=preview" >> "$GITHUB_ENV"
            elif [[ "$BRANCH" == "preview" ]]; then
              echo "::error::Branch name 'preview' is reserved for the preview release channel"
              exit 1
            else
              echo "JHC_CHANNEL=${BRANCH}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Verify Cargo version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#v}"
          ACTUAL=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Tag $TAG does not match Cargo.toml package version $ACTUAL"
            exit 1
          fi

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Rename binaries
        shell: bash
        run: |
          for pair in "jhc:jhc"; do
            cargo_name="${pair%%:*}"
            release_name="${pair##*:}"
            src="target/${{ matrix.target }}/release/${cargo_name}"
            if [[ -f "${src}.exe" ]]; then
              mv "${src}.exe" "${release_name}-${{ matrix.target }}.exe"
            elif [[ -f "${src}" ]]; then
              mv "${src}" "${release_name}-${{ matrix.target }}"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: |
            jhc-${{ matrix.target }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on master
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag commit $GITHUB_SHA is not reachable from origin/master. Only commits merged to master may be tagged for stable release"
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release params
        id: params
        shell: bash
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          LOG_FORMAT="- [%h](${REPO_URL}/commit/%H) %s"
          BUMP_PATTERN='^chore(release):'

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PREV_TAG=$(git describe --tags --abbrev=0 --match 'v*' "${TAG}^" 2>/dev/null || true)
            {
              echo "Changes this release:"
              echo ""
              if [[ -n "$PREV_TAG" ]]; then
                git log --format="$LOG_FORMAT" --invert-grep --grep="$BUMP_PATTERN" "${PREV_TAG}..${TAG}"
              else
                git log -1 --format="$LOG_FORMAT" "${TAG}"
              fi
            } > notes.md

            HIGHEST=$(git tag -l 'v*' | sort -V | tail -1)
            if [[ "$HIGHEST" == "$TAG" ]]; then
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            if [[ "$BRANCH" == "master" ]]; then
              CHANNEL_TAG="preview"
              CHANNEL_TITLE="Preview"
            else
              CHANNEL_TAG="$BRANCH"
              CHANNEL_TITLE="$BRANCH"
            fi
            PREV_TAG=$(git describe --tags --abbrev=0 --match 'v*' HEAD 2>/dev/null || true)
            {
              echo "Changes this release:"
              echo ""
              if [[ -n "$PREV_TAG" ]]; then
                git log --format="$LOG_FORMAT" --invert-grep --grep="$BUMP_PATTERN" "${PREV_TAG}..HEAD"
              else
                git log --format="$LOG_FORMAT" --invert-grep --grep="$BUMP_PATTERN" HEAD
              fi
            } > notes.md

            echo "tag=${CHANNEL_TAG}" >> "$GITHUB_OUTPUT"
            echo "title=${CHANNEL_TITLE}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing prerelease
        if: steps.params.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          PRERELEASE="${{ steps.params.outputs.prerelease }}"
          MAKE_LATEST="${{ steps.params.outputs.make_latest }}"
          TITLE="${{ steps.params.outputs.title }}"

          FLAGS=(--title "$TITLE" --notes-file notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--target "$GITHUB_SHA" --prerelease)
          fi
          FLAGS+=(--latest="$MAKE_LATEST")

          gh release create "$TAG" artifacts/* "${FLAGS[@]}"
